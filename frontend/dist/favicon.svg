<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a6b4a"/>

  <!-- Waterfall: top stream -->
  <rect x="28" y="8" width="8" height="14" rx="4" fill="#f5c35a"/>

  <!-- Waterfall: spreading cascade mid layer -->
  <rect x="22" y="20" width="6" height="12" rx="3" fill="#e8f5ee" opacity="0.92"/>
  <rect x="29" y="18" width="6" height="14" rx="3" fill="white"/>
  <rect x="36" y="20" width="6" height="12" rx="3" fill="#e8f5ee" opacity="0.92"/>

  <!-- Waterfall: wide bottom spread -->
  <rect x="14" y="30" width="6" height="10" rx="3" fill="#e8f5ee" opacity="0.7"/>
  <rect x="21" y="29" width="6" height="11" rx="3" fill="#e8f5ee" opacity="0.85"/>
  <rect x="29" y="28" width="6" height="12" rx="3" fill="white"/>
  <rect x="37" y="29" width="6" height="11" rx="3" fill="#e8f5ee" opacity="0.85"/>
  <rect x="44" y="30" width="6" height="10" rx="3" fill="#e8f5ee" opacity="0.7"/>

  <!-- Pool at the base -->
  <ellipse cx="32" cy="44" rx="18" ry="6" fill="#2d9e72" opacity="0.85"/>
  <ellipse cx="32" cy="44" rx="12" ry="3.5" fill="#6ee7a8" opacity="0.55"/>

  <!-- Gold accent dot on top -->
  <circle cx="32" cy="6" r="3" fill="#f5c35a"/>
</svg>
